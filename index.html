<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASOT Player — A State of Trance 001-499</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e40;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e2e2f0;
    --text-muted: #7878a0;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --player-h: 120px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--accent2);
    white-space: nowrap;
  }

  .stats {
    display: flex;
    gap: 12px;
    font-size: 0.78rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .stat { display: flex; align-items: center; gap: 4px; }
  .stat[data-state] { cursor: pointer; border-radius: 10px; padding: 2px 6px; margin: -2px -6px; transition: background 0.15s; }
  .stat[data-state]:hover { background: var(--surface2); color: var(--text); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-done   { background: var(--green); }
  .dot-wip    { background: var(--amber); }
  .dot-new    { background: var(--text-muted); }

  .search-wrap {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
  }

  /* ── Track list ── */
  #track-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  #track-list::-webkit-scrollbar { width: 6px; }
  #track-list::-webkit-scrollbar-track { background: transparent; }
  #track-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s;
    user-select: none;
  }

  .track-item:hover { background: var(--surface); }

  .track-item.playing {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .track-num {
    font-size: 0.75rem;
    color: var(--text-muted);
    width: 30px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .track-item.playing .track-num { color: var(--accent2); }

  .status-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
  }
  .status-icon.done  { background: rgba(52,211,153,0.15); color: var(--green); }
  .status-icon.wip   { background: rgba(251,191,36,0.15);  color: var(--amber); }
  .status-icon.new   { background: rgba(120,120,160,0.1);  color: var(--text-muted); }
  .status-icon.now   { background: rgba(108,99,255,0.25);  color: var(--accent2); }

  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-size: 0.88rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-item.playing .track-title { color: var(--accent2); }

  .track-meta {
    font-size: 0.73rem;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }

  /* Mini progress bar inside list */
  .track-progress {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 4px;
    overflow: hidden;
  }
  .track-progress-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 1px;
    transition: width 0.3s;
  }
  .track-item.done-item .track-progress-fill { background: var(--green); }

  .track-dur {
    font-size: 0.75rem;
    color: var(--text-muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ── Player bar ── */
  #player-bar {
    height: var(--player-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .now-playing-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-playing-title span { color: var(--text-muted); font-weight: 400; margin-right: 6px; }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .ctrl-btn:hover { color: var(--accent2); }
  .ctrl-btn:disabled { color: var(--border); cursor: default; }

  .btn-play {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 50%;
    color: #fff;
  }
  .btn-play:hover { background: var(--accent2); color: #fff; }

  .time-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Seek bar */
  .seek-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    position: relative;
  }

  #seek-bar {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: linear-gradient(
      to right,
      var(--accent) 0%,
      var(--accent) var(--pct, 0%),
      var(--border) var(--pct, 0%),
      var(--border) 100%
    );
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
    margin-top: -5px;
  }
  #seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
    border: none;
  }

  /* Volume */
  #vol-bar {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #vol-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-muted);
    cursor: pointer;
  }

  /* Loading state */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { color: var(--text-muted); font-size: 0.9rem; }

  #error-msg {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--red);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* ── Quick nav ── */
  #quick-nav {
    display: flex;
    gap: 6px;
    padding: 7px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .qnav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .qnav-btn:hover  { background: var(--border); color: var(--text); }
  .qnav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Scrollbar fill for seek ── */
  .filled-track {
    background: linear-gradient(
      to right,
      var(--accent) 0%,
      var(--accent) var(--pct, 0%),
      var(--border) var(--pct, 0%),
      var(--border) 100%
    );
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading track list from archive.org…</p>
</div>

<!-- Header -->
<header>
  <h1>A State of Trance 001–499</h1>
  <div class="stats" id="stats"></div>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search episode…" autocomplete="off">
    <select id="filter">
      <option value="all">All</option>
      <option value="new">Unplayed</option>
      <option value="wip">In progress</option>
      <option value="done">Completed</option>
    </select>
  </div>
</header>

<!-- Quick nav -->
<div id="quick-nav">
  <button class="qnav-btn" data-min="1"   data-max="100">1–100</button>
  <button class="qnav-btn" data-min="101" data-max="200">101–200</button>
  <button class="qnav-btn" data-min="201" data-max="300">201–300</button>
  <button class="qnav-btn" data-min="301" data-max="400">301–400</button>
  <button class="qnav-btn" data-min="401" data-max="499">401–499</button>
</div>

<!-- Track list -->
<div id="track-list">
  <div id="error-msg">
    Failed to load track list. Check your internet connection and reload.
  </div>
</div>

<!-- Player bar -->
<div id="player-bar">
  <div class="now-playing-title" id="now-playing-title">Nothing playing — select a track above</div>
  <div class="player-controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-back" title="Back 30s" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="8.5" y="15.5" font-size="5" font-weight="bold" fill="currentColor">30</text></svg>
    </button>
    <button class="ctrl-btn btn-play" id="btn-play" title="Play/Pause" disabled>
      <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-fwd" title="Forward 30s" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="8.5" y="15.5" font-size="5" font-weight="bold" fill="currentColor">30</text></svg>
    </button>
    <button class="ctrl-btn" id="btn-next" title="Next" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
    </button>

    <span class="time-label" id="time-current">0:00:00</span>
    <div class="seek-wrap">
      <input type="range" id="seek-bar" min="0" max="1000" value="0" step="1">
    </div>
    <span class="time-label" id="time-total">0:00:00</span>

    <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--text-muted)" style="flex-shrink:0">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <input type="range" id="vol-bar" min="0" max="100" value="80" step="1" title="Volume">
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const ITEM_ID  = 'Armin_van_Buuren_A_State_of_Trance_001-499';
const META_URL = `https://archive.org/metadata/${ITEM_ID}`;
const DL_BASE  = `https://archive.org/download/${ITEM_ID}/`;
const STORAGE_KEY = 'asot_player_v1';
const VIEW_KEY    = 'asot_view_v1';
const SAVE_INTERVAL_MS = 4000;      // save position every 4 s
const COMPLETE_THRESHOLD = 0.97;    // 97% = completed

// ── Storage helpers ────────────────────────────────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveProgress(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { console.warn('Storage write failed:', e); }
}

// ── State ──────────────────────────────────────────────────────────────────
let tracks    = [];   // [{name, title, length, num}, …]
let progress  = loadProgress();
let currentIdx = -1;
let isSeeking  = false;
let saveTimer  = null;

// ── DOM refs ───────────────────────────────────────────────────────────────
const audio        = document.getElementById('audio');
const trackList    = document.getElementById('track-list');
const nowTitle     = document.getElementById('now-playing-title');
const btnPlay      = document.getElementById('btn-play');
const iconPlay     = document.getElementById('icon-play');
const iconPause    = document.getElementById('icon-pause');
const btnPrev      = document.getElementById('btn-prev');
const btnNext      = document.getElementById('btn-next');
const btnBack      = document.getElementById('btn-back');
const btnFwd       = document.getElementById('btn-fwd');
const seekBar      = document.getElementById('seek-bar');
const volBar       = document.getElementById('vol-bar');
const timeCurrent  = document.getElementById('time-current');
const timeTotal    = document.getElementById('time-total');
const searchInput  = document.getElementById('search');
const filterSelect = document.getElementById('filter');
const statsEl      = document.getElementById('stats');
const loadingEl    = document.getElementById('loading');
const errorEl      = document.getElementById('error-msg');

// ── Utilities ──────────────────────────────────────────────────────────────
function hms(sec) {
  if (!sec || isNaN(sec)) return '0:00:00';
  const s = Math.floor(sec);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function trackState(name) {
  const p = progress[name];
  if (!p || !(p.position >= 20)) return 'new';
  if (p.completed) return 'done';
  return 'wip';
}

function episodeNum(title, name) {
  // Try to extract episode number from title or filename
  const m = (title + ' ' + name).match(/\b0*(\d{3})\b/);
  return m ? parseInt(m[1], 10) : 9999;
}

// ── Fetch metadata ─────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(META_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Keep only original audio files (VBR MP3, 128Kbps MP3, etc.)
    // Prefer VBR originals; fall back to any mp3
    const allFiles = data.files || [];

    // Collect originals by name
    const originals = allFiles.filter(f =>
      f.source === 'original' &&
      (f.format === 'VBR MP3' || f.format === 'MP3' || f.name.toLowerCase().endsWith('.mp3'))
    );

    // Fallback: if no originals found, take any mp3
    const mp3s = originals.length > 0
      ? originals
      : allFiles.filter(f => f.name.toLowerCase().endsWith('.mp3'));

    if (mp3s.length === 0) throw new Error('No MP3 files found in this archive item.');

    tracks = mp3s.map(f => ({
      name:   f.name,
      title:  f.title || f.name.replace(/\.[^.]+$/, '').replace(/_/g, ' '),
      length: parseFloat(f.length) || 0,
      num:    episodeNum(f.title || '', f.name),
    })).sort((a, b) => a.num - b.num || a.name.localeCompare(b.name));

    loadingEl.style.display = 'none';
    restoreView();
    renderAll();
    updateStats();
    requestAnimationFrame(updateQnavActive);
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'block';
    errorEl.textContent      = `Error loading tracks: ${err.message}`;
    console.error(err);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderAll() {
  const q   = searchInput.value.trim().toLowerCase();
  const fil = filterSelect.value;

  const filtered = tracks.filter(t => {
    const st = trackState(t.name);
    if (fil !== 'all' && st !== fil) return false;
    if (q && !t.title.toLowerCase().includes(q) && !String(t.num).includes(q)) return false;
    return true;
  });

  if (filtered.length === 0) {
    trackList.innerHTML = '<div class="empty-state">No tracks match your filter.</div>';
    return;
  }

  trackList.innerHTML = '';
  const frag = document.createDocumentFragment();

  filtered.forEach((t, i) => {
    const st   = trackState(t.name);
    const p    = progress[t.name];
    const pos  = p?.position || 0;
    const dur  = p?.duration  || t.length || 0;
    const pct  = dur > 0 ? Math.min(100, (pos / dur) * 100) : 0;
    const isNow = tracks.indexOf(t) === currentIdx;

    const el = document.createElement('div');
    el.className = `track-item${isNow ? ' playing' : ''}${st === 'done' ? ' done-item' : ''}`;
    el.dataset.idx = tracks.indexOf(t);

    const iconMap = { done: '✓', wip: '▶', new: '·', now: '♫' };
    const stClass = isNow ? 'now' : st;

    el.innerHTML = `
      <span class="track-num">${t.num < 9999 ? String(t.num).padStart(3,'0') : '–'}</span>
      <span class="status-icon ${stClass}">${iconMap[stClass] || iconMap[st]}</span>
      <div class="track-info">
        <div class="track-title">${escHtml(t.title)}</div>
        <div class="track-meta">
          ${st === 'wip' ? `<span>Stopped at ${hms(pos)}</span>` : ''}
          ${st === 'done' ? '<span style="color:var(--green)">Completed</span>' : ''}
          ${st === 'new' ? '<span>Not played</span>' : ''}
        </div>
        ${(st === 'wip' || st === 'done') && dur > 0 ? `
        <div class="track-progress">
          <div class="track-progress-fill" style="width:${pct.toFixed(1)}%"></div>
        </div>` : ''}
      </div>
      <span class="track-dur">${dur > 0 ? hms(dur) : ''}</span>
    `;

    el.addEventListener('click', () => playTrack(parseInt(el.dataset.idx, 10)));
    frag.appendChild(el);
  });

  trackList.appendChild(frag);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const total = tracks.length;
  const done  = tracks.filter(t => progress[t.name]?.completed).length;
  const wip   = tracks.filter(t => {
    const p = progress[t.name];
    return p && !p.completed && p.position > 0;
  }).length;
  const fresh = total - done - wip;

  statsEl.innerHTML = `
    <span class="stat" data-state="done"><span class="dot dot-done"></span>${done} completed</span>
    <span class="stat" data-state="wip"><span class="dot dot-wip"></span>${wip} in progress</span>
    <span class="stat" data-state="new"><span class="dot dot-new"></span>${fresh} unplayed</span>
    <span class="stat">${total} total</span>
  `;
}

statsEl.addEventListener('click', e => {
  const state = e.target.closest('[data-state]')?.dataset.state;
  if (!state) return;
  const items = trackList.querySelectorAll('.track-item');
  for (const item of items) {
    const t = tracks[parseInt(item.dataset.idx, 10)];
    if (t && trackState(t.name) === state) {
      item.scrollIntoView({ block: 'start', behavior: 'smooth' });
      return;
    }
  }
});

// ── Playback ───────────────────────────────────────────────────────────────
function playTrack(idx) {
  if (idx < 0 || idx >= tracks.length) return;

  const t = tracks[idx];
  currentIdx = idx;

  audio.src = DL_BASE + encodeURIComponent(t.name);

  const savedPos = progress[t.name]?.position || 0;
  const shouldResume = savedPos > 1 && !progress[t.name]?.completed;

  audio.onloadedmetadata = null;
  audio.onseeked = null;

  if (shouldResume) {
    // Seek first, then play. audio.load() is needed to start fetching
    // because preload="none" means setting src alone does nothing.
    audio.onloadedmetadata = () => {
      audio.onloadedmetadata = null;
      audio.currentTime = savedPos;
      audio.onseeked = () => {
        audio.onseeked = null;
        audio.play().catch(console.error);
      };
    };
    audio.load();
  } else {
    audio.play().catch(console.error);
  }

  // Update player UI
  nowTitle.innerHTML = `<span>ASOT ${t.num < 9999 ? String(t.num).padStart(3,'0') : ''}</span>${escHtml(t.title)}`;
  timeTotal.textContent = t.length > 0 ? hms(t.length) : '–:–:–';

  btnPlay.disabled = false;
  btnBack.disabled = false;
  btnFwd.disabled  = false;
  updateNavButtons();

  renderAll();
  scrollToPlaying();
}

function scrollToPlaying() {
  const el = trackList.querySelector('.track-item.playing');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Audio events ───────────────────────────────────────────────────────────
audio.addEventListener('play', () => {
  iconPlay.style.display  = 'none';
  iconPause.style.display = '';
  startSaveTimer();
});

audio.addEventListener('pause', () => {
  iconPlay.style.display  = '';
  iconPause.style.display = 'none';
  saveCurrentPosition();
  clearInterval(saveTimer);
});

audio.addEventListener('ended', () => {
  iconPlay.style.display  = '';
  iconPause.style.display = 'none';
  clearInterval(saveTimer);

  const t = tracks[currentIdx];
  if (t) {
    progress[t.name] = {
      position:  audio.duration || t.length,
      duration:  audio.duration || t.length,
      completed: true,
      lastPlayed: new Date().toISOString(),
    };
    saveProgress(progress);
    renderAll();
    updateStats();
  }

  // Auto-advance
  if (currentIdx + 1 < tracks.length) {
    playTrack(currentIdx + 1);
  }
});

audio.addEventListener('timeupdate', () => {
  if (isSeeking) return;
  const cur = audio.currentTime;
  const dur = audio.duration;
  if (!isNaN(dur) && dur > 0) {
    seekBar.value = Math.round((cur / dur) * 1000);
    seekBar.style.setProperty('--pct', ((cur/dur)*100).toFixed(2) + '%');
  }
  timeCurrent.textContent = hms(cur);
  if (!isNaN(dur)) timeTotal.textContent = hms(dur);
});

audio.addEventListener('durationchange', () => {
  const dur = audio.duration;
  if (!isNaN(dur) && dur > 0 && currentIdx >= 0) {
    const t = tracks[currentIdx];
    if (t) {
      if (!progress[t.name]) progress[t.name] = {};
      progress[t.name].duration = dur;
    }
  }
});

function saveCurrentPosition() {
  if (currentIdx < 0) return;
  const t = tracks[currentIdx];
  if (!t) return;
  const dur = audio.duration || t.length;
  const pos = audio.currentTime;
  if (pos < 20) return;
  const comp = dur > 0 && (pos / dur) >= COMPLETE_THRESHOLD;

  progress[t.name] = {
    position:   pos,
    duration:   dur || progress[t.name]?.duration || 0,
    completed:  comp || progress[t.name]?.completed || false,
    lastPlayed: new Date().toISOString(),
  };
  saveProgress(progress);
  if (comp) { renderAll(); updateStats(); }
}

function startSaveTimer() {
  clearInterval(saveTimer);
  saveTimer = setInterval(saveCurrentPosition, SAVE_INTERVAL_MS);
}

// ── Controls ───────────────────────────────────────────────────────────────
btnPlay.addEventListener('click', () => {
  if (currentIdx < 0) { playTrack(0); return; }
  audio.paused ? audio.play() : audio.pause();
});

btnPrev.addEventListener('click', () => {
  if (currentIdx > 0) playTrack(currentIdx - 1);
});

btnNext.addEventListener('click', () => {
  if (currentIdx < tracks.length - 1) playTrack(currentIdx + 1);
});

btnBack.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 30); });
btnFwd.addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 30); });

// Seek
seekBar.addEventListener('mousedown', () => { isSeeking = true; });
seekBar.addEventListener('input', () => {
  const dur = audio.duration;
  if (!isNaN(dur) && dur > 0) {
    const t = (seekBar.value / 1000) * dur;
    timeCurrent.textContent = hms(t);
    seekBar.style.setProperty('--pct', ((seekBar.value / 1000) * 100).toFixed(2) + '%');
  }
});
seekBar.addEventListener('change', () => {
  isSeeking = false;
  const dur = audio.duration;
  if (!isNaN(dur) && dur > 0) {
    audio.currentTime = (seekBar.value / 1000) * dur;
  }
});

// Volume
volBar.addEventListener('input', () => {
  audio.volume = volBar.value / 100;
});
audio.volume = volBar.value / 100;

// Search + filter
searchInput.addEventListener('input', renderAll);
filterSelect.addEventListener('change', renderAll);

// Update prev/next button states
function updateNavButtons() {
  btnPrev.disabled = currentIdx <= 0;
  btnNext.disabled = currentIdx < 0 || currentIdx >= tracks.length - 1;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'SELECT') return;

  switch (e.code) {
    case 'Space':
      e.preventDefault();
      if (currentIdx < 0) playTrack(0);
      else audio.paused ? audio.play() : audio.pause();
      break;
    case 'ArrowLeft':  audio.currentTime = Math.max(0, audio.currentTime - 10); break;
    case 'ArrowRight': audio.currentTime = Math.min(audio.duration||Infinity, audio.currentTime + 10); break;
    case 'ArrowUp':    audio.volume = Math.min(1, audio.volume + 0.05); volBar.value = Math.round(audio.volume*100); break;
    case 'ArrowDown':  audio.volume = Math.max(0, audio.volume - 0.05); volBar.value = Math.round(audio.volume*100); break;
    case 'KeyN':       if (currentIdx < tracks.length-1) playTrack(currentIdx+1); break;
    case 'KeyP':       if (currentIdx > 0) playTrack(currentIdx-1); break;
  }
});

// Re-render periodically to update progress bars while playing
setInterval(() => {
  if (!audio.paused && currentIdx >= 0) renderAll();
  updateNavButtons();
}, 10000);

// Persist on page unload
window.addEventListener('beforeunload', saveCurrentPosition);
window.addEventListener('pagehide',     saveCurrentPosition);

// ── View persistence ───────────────────────────────────────────────────────
function saveView() {
  try {
    localStorage.setItem(VIEW_KEY, JSON.stringify({
      scroll: trackList.scrollTop,
      filter: filterSelect.value,
      search: searchInput.value,
    }));
  } catch {}
}

function restoreView() {
  try {
    const v = JSON.parse(localStorage.getItem(VIEW_KEY));
    if (!v) return;
    if (v.filter) filterSelect.value = v.filter;
    if (v.search) searchInput.value  = v.search;
    if (v.scroll) requestAnimationFrame(() => { trackList.scrollTop = v.scroll; });
  } catch {}
}

// Save view on scroll (debounced) and on filter/search changes
let scrollSaveTimer = null;
trackList.addEventListener('scroll', () => {
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(saveView, 300);
});
searchInput.addEventListener('input',   saveView);
filterSelect.addEventListener('change', saveView);

// ── Quick navigation ───────────────────────────────────────────────────────
const qnavBtns = document.querySelectorAll('.qnav-btn');

function updateQnavActive() {
  const scroll = trackList.scrollTop;
  const items  = trackList.querySelectorAll('.track-item');
  if (!items.length) return;

  // Find the episode number of the first fully-visible item
  let topNum = null;
  for (const item of items) {
    if (item.offsetTop >= scroll - 4) {
      const idx = parseInt(item.dataset.idx, 10);
      topNum = tracks[idx]?.num ?? null;
      break;
    }
  }
  if (topNum === null) return;

  qnavBtns.forEach(btn => {
    const min = parseInt(btn.dataset.min, 10);
    const max = parseInt(btn.dataset.max, 10);
    btn.classList.toggle('active', topNum >= min && topNum <= max);
  });
}

qnavBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const min = parseInt(btn.dataset.min, 10);
    const max = parseInt(btn.dataset.max, 10);

    // Clear search/filter so all tracks in range are visible
    searchInput.value  = '';
    filterSelect.value = 'all';
    renderAll();
    saveView();

    // Scroll to first track in the range
    const items = trackList.querySelectorAll('.track-item');
    for (const item of items) {
      const idx = parseInt(item.dataset.idx, 10);
      const t   = tracks[idx];
      if (t && t.num >= min && t.num <= max) {
        item.scrollIntoView({ block: 'start', behavior: 'smooth' });
        break;
      }
    }
  });
});

// Update active quick-nav button on scroll
trackList.addEventListener('scroll', updateQnavActive);

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
